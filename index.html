<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="おうち新幹線ウォッチャー">
  <title>おうち新幹線ウォッチャー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #fff5f8;
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
      color: #2c2c2a;
    }
    .header { text-align: center; margin-bottom: 1.2rem; }
    .header-icon { font-size: 22px; margin-bottom: 4px; }
    .header h1 { font-size: 18px; font-weight: 700; color: #72243E; }
    .header p { font-size: 11px; color: #aaa; margin-top: 3px; }

    .hero {
      background: #FBEAF0;
      border-radius: 28px;
      padding: 24px 20px 20px;
      text-align: center;
      margin-bottom: 1.2rem;
      border: 1px solid #F4C0D1;
    }
    .hero-label { font-size: 13px; color: #993556; margin-bottom: .8rem; }
    .cd-wrap { display: flex; align-items: flex-end; justify-content: center; gap: 4px; margin-bottom: .8rem; }
    .cd-block { display: flex; flex-direction: column; align-items: center; }
    .cd-num { font-size: 96px; font-weight: 700; line-height: 1; color: #72243E; font-variant-numeric: tabular-nums; letter-spacing: -4px; }
    .cd-unit { font-size: 16px; color: #993556; margin-top: 4px; font-weight: 600; }
    .cd-sep { font-size: 76px; font-weight: 700; color: #D4537E; line-height: 1; margin-bottom: 10px; }
    .pass-row { font-size: 13px; color: #993556; margin-bottom: 1rem; }
    .pass-time-big { font-size: 24px; font-weight: 700; color: #72243E; }
    .dir-badge { display: inline-block; font-size: 13px; font-weight: 600; padding: 5px 16px; border-radius: 40px; margin-bottom: 8px; }
    .dir-badge.south { background: #F4C0D1; color: #72243E; }
    .dir-badge.north { background: #B5D4F4; color: #0C447C; }
    .train-name { font-size: 12px; color: #aaa; margin-bottom: 1.2rem; }
    .bar-wrap { background: #F4C0D1; border-radius: 6px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; background: #D4537E; border-radius: 6px; transition: width 1s linear; }

    .next-label { font-size: 11px; color: #aaa; margin-bottom: 6px; margin-top: 1.2rem; }
    .list-card { background: #fff; border: 1px solid #F4C0D1; border-radius: 16px; overflow: hidden; }
    .list-row { display: flex; align-items: center; padding: 11px 14px; gap: 8px; border-bottom: 1px solid #fde8f0; }
    .list-row:last-child { border-bottom: none; }
    .list-row.now { background: #FBEAF0; }
    .lt { font-size: 14px; font-weight: 700; color: #2c2c2a; min-width: 44px; }
    .ln { font-size: 12px; color: #666; flex: 1; }
    .dir-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 40px; }
    .dir-tag.south { background: #F4C0D1; color: #72243E; }
    .dir-tag.north { background: #B5D4F4; color: #0C447C; }
    .badge-now { font-size: 10px; background: #D4537E; color: #fff; padding: 2px 8px; border-radius: 40px; font-weight: 600; }
    .loading { text-align: center; color: #993556; padding: 2rem; font-size: 14px; }
    .source-note { font-size: 10px; color: #ccc; text-align: center; margin-top: 1.5rem; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🚅🏠🚅</div>
    <h1>おうち新幹線ウォッチャー</h1>
    <p>JR上熊本駅付近の通過時刻</p>
  </div>

  <div class="hero">
    <div class="hero-label">⏱️ 次の新幹線が通過するまで</div>
    <div class="cd-wrap">
      <div class="cd-block">
        <div class="cd-num" id="cdMin">--</div>
        <div class="cd-unit">分</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-block">
        <div class="cd-num" id="cdSec">--</div>
        <div class="cd-unit">秒</div>
      </div>
    </div>
    <div class="pass-row">🕙 通過予定時刻　<span class="pass-time-big" id="passTime">--:--</span></div>
    <div id="dirBadge" class="dir-badge south">🚅 下り（鹿児島方面）</div>
    <div class="train-name" id="trainName">読み込み中...</div>
    <div class="bar-wrap"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
  </div>

  <div class="next-label">🗓️ この後の通過予定</div>
  <div class="list-card" id="nextList">
    <div class="loading">読み込み中...</div>
  </div>
  <div class="source-note">※ JR九州公式時刻表データ使用（新幹線研究センター参照）</div>

  <script>
    let allTrains = null;

    function toMin(t) {
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }
    function nowSec() {
      const n = new Date();
      return n.getHours() * 3600 + n.getMinutes() * 60 + n.getSeconds();
    }

    function buildAll(data) {
      const all = [];
      data.south.forEach(r => all.push({ ...r, dir: 'south' }));
      data.north.forEach(r => all.push({ ...r, dir: 'north' }));
      all.sort((a, b) => toMin(a.pass) - toMin(b.pass));
      return all;
    }

    function findNext(all) {
      const ns = nowSec();
      for (let i = 0; i < all.length; i++) {
        if (toMin(all[i].pass) * 60 > ns) return i;
      }
      return 0;
    }

    function update() {
      if (!allTrains) return;
      const idx = findNext(allTrains);
      const next = allTrains[idx];
      const ns = nowSec();

      let diff = toMin(next.pass) * 60 - ns;
      if (diff < 0) diff += 86400;

      document.getElementById('cdMin').textContent = String(Math.floor(diff / 60)).padStart(2, '0');
      document.getElementById('cdSec').textContent = String(diff % 60).padStart(2, '0');
      document.getElementById('passTime').textContent = next.pass;

      const badge = document.getElementById('dirBadge');
      if (next.dir === 'south') {
        badge.className = 'dir-badge south';
        badge.textContent = '🚅 下り（鹿児島方面）';
      } else {
        badge.className = 'dir-badge north';
        badge.textContent = '🚄 上り（博多方面）';
      }
      document.getElementById('trainName').textContent = next.name + ' → ' + next.dest;

      const prevIdx = (idx - 1 + allTrains.length) % allTrains.length;
      const prevSec = toMin(allTrains[prevIdx].pass) * 60;
      const nextSec = toMin(next.pass) * 60;
      let gap = nextSec - prevSec;
      if (gap <= 0) gap += 86400;
      let elapsed = ns - prevSec;
      if (elapsed < 0) elapsed += 86400;
      const pct = Math.min(100, Math.max(0, (elapsed / gap) * 100));
      document.getElementById('barFill').style.width = pct + '%';

      const upcoming = [];
      for (let i = 0; i < allTrains.length && upcoming.length < 6; i++) {
        const j = (idx + i) % allTrains.length;
        upcoming.push({ ...allTrains[j], isNext: i === 0 });
      }
      document.getElementById('nextList').innerHTML = upcoming.map(r => `
        <div class="list-row${r.isNext ? ' now' : ''}">
          <span class="lt">${r.pass}</span>
          <span class="ln">${r.name}</span>
          <span class="dir-tag ${r.dir}">${r.dir === 'south' ? '🚅 下り' : '🚄 上り'}</span>
          ${r.isNext ? '<span class="badge-now">⭐ 次</span>' : ''}
        </div>
      `).join('');
    }

    fetch('./timetable.json')
      .then(r => r.json())
      .then(data => {
        allTrains = buildAll(data);
        update();
        setInterval(update, 1000);
      })
      .catch(() => {
        document.getElementById('nextList').innerHTML = '<div class="loading">⚠️ 時刻表の読み込みに失敗しました</div>';
      });
  </script>
</body>
</html>
